# Dank color generation
include dank-tabs.conf
include dank-theme.conf

# Terminal features
copy_on_select yes
strip_trailing_spaces smart

shell fish
shell_integration enabled

cursor_shape block
cursor_trail 1

force_ltr no
open_url_with ${OPENER}
url_prefixes http https file ftp
enable_audio_bell no

scrollback_pager nvim -c "set signcolumn=no showtabline=0" +"nnoremap q ZQ" -c "silent write! /tmp/kitty_scrollback_buffer | te cat /tmp/kitty_scrollback_buffer - "

font_family      family="Maple Mono"
# font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 9.0

background_opacity 0.8
dynamic_background_opacity yes

window_border_width 0pt
window_padding_width 0

#hide_window_decorations yes
confirm_os_window_close 0
allow_remote_control yes

env KITTY=true

map ctrl+shift+u scroll_page_up
map ctrl+shift+d scroll_page_down
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down
map ctrl+shift+a scroll_home
map ctrl+shift+e scroll_end
map ctrl+shift+z scroll_to_prompt -1
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+f show_scrollback

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no
